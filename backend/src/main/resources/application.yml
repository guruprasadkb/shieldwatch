server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:shieldwatch;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never

jwt:
  secret: shieldwatch-secret-key-for-jwt-token-generation-minimum-256-bits-long
  expiration: 86400000

logging:
  level:
    com.shieldwatch: INFO
